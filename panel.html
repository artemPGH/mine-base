<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | Игровая Панель</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a0a !important; height: 100vh; overflow: hidden; }
        .grid-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px;
            height: 90vh;
        }
        .col { 
            background: #151515; 
            border: 2px solid #333; 
            padding: 20px; 
            border-radius: 12px; 
            display: flex;
            flex-direction: column;
        }
        .calc-input {
            width: 80%;
            padding: 10px;
            background: #222;
            border: 1px solid var(--accent);
            color: white;
            margin: 5px 0;
            border-radius: 4px;
        }
        h2 { color: var(--accent); margin-top: 0; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div style="padding: 10px 20px; background: #1b5e20; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" style="height: 30px;">
            <b style="color: white;">MINE-BASE PANEL (V 1.0)</b>
        </div>
        <a href="index.html" style="color: white; font-weight: bold;">← ВЕРНУТЬСЯ НА САЙТ</a>
    </div>

    <div class="grid-panel">
        <div class="col">
            <h2>🧭 Координаты ада</h2>
            <p style="font-size: 0.8rem; color: #888;">Введи координаты в Обычном мире:</p>
            <input type="number" id="overX" class="calc-input" placeholder="Координата X">
            <input type="number" id="overZ" class="calc-input" placeholder="Координата Z">
            <div style="margin-top: 20px; padding: 15px; background: #222; border-radius: 8px;">
                <p style="margin:0; color: #888;">В аду строить тут:</p>
                <h3 id="netherRes" style="margin: 5px 0; color: var(--panel-btn);">X: 0 | Z: 0</h3>
            </div>
        </div>

        <div class="col">
            <h2>📝 Заметки</h2>
            <textarea style="flex-grow: 1; background: transparent; color: #ddd; border: 1px dashed #444; padding: 10px; resize: none; outline: none;" placeholder="Напиши тут список ресурсов или координаты базы..."></textarea>
        </div>

        <div class="col">
            <h2>⌨️ Команды</h2>
            <div class="tool-btn" onclick="copyToClipboard('/gamerule keepInventory true')">Сохранение вещей</div>
            <div class="tool-btn" onclick="copyToClipboard('/locate structure village')">Найти деревню</div>
            <div class="tool-btn" onclick="copyToClipboard('/gamemode creative')">Креатив</div>
            <p id="copyStatus" style="text-align: center; color: var(--accent); font-size: 0.8rem; margin-top: 10px; display: none;">Скопировано!</p>
        </div>
    </div>

    <script>
        // Логика калькулятора
        const ox = document.getElementById('overX');
        const oz = document.getElementById('overZ');
        const res = document.getElementById('netherRes');

        function updateCalc() {
            const x = Math.round(ox.value / 8) || 0;
            const z = Math.round(oz.value / 8) || 0;
            res.innerText = `X: ${x} | Z: ${z}`;
        }

        ox.addEventListener('input', updateCalc);
        oz.addEventListener('input', updateCalc);

        // Функция копирования
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            const status = document.getElementById('copyStatus');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 2000);
        }
    </script>

</body>
</html>
