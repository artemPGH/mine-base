<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | Игровая панель</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- СЕТКА ПАНЕЛИ --- */
        .panel-grid {
            display: grid;
            grid-template-columns: 380px 1fr 380px; /* Сделал боковые колонки чуть шире для таблиц */
            gap: 20px;
            padding: 20px;
            max-width: 1700px;
            margin: 0 auto;
        }

        .version-info {
            display: flex;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }
        .v-main { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
        .v-sub { font-size: 0.8rem; color: var(--text-muted); margin-left: 10px; text-transform: uppercase; }

        /* --- ЗАМЕТКИ --- */
        .notes-area {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 25px;
            border: 2px solid var(--border);
            min-height: 750px;
            display: flex;
            flex-direction: column;
        }
        .note-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #252525;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: 0.3s;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }
        .note-item:hover { transform: scale(1.01); background: #2d2d2d; }
        .note-text { flex-grow: 1; margin: 0 15px; font-weight: 600; }
        .btn-del {
            background: #ff5555;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-del:hover { background: #ff0000; }

        /* --- ГЕНЕРАТОР БРОНИ (NEW) --- */
        .armor-generator {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .color-picker-wrap input[type="color"] {
            width: 60px; height: 60px;
            border: none; background: none; cursor: pointer;
        }
        .armor-cmds {
            background: #000;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
            font-family: monospace;
            font-size: 0.75rem;
            color: #ddd;
        }
        .cmd-line {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #333;
            word-break: break-all;
        }
        .cmd-line:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .c-val { color: var(--accent); font-weight: bold; }

        /* --- ТАБЛИЦА ЕДЫ (NEW) --- */
        .food-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .food-table th {
            background: #222;
            color: var(--accent);
            padding: 8px;
            text-align: left;
            border-bottom: 2px solid var(--accent);
        }
        .food-table td {
            padding: 8px;
            border-bottom: 1px solid #333;
            color: #e0e0e0;
        }
        .food-table tr:hover { background: #1a1a1a; }
        .tier-great { border-left: 3px solid #FFD700; }
        .tier-good { border-left: 3px solid #00FA9A; }
        .tier-normal { border-left: 3px solid #FFA500; }
        .tier-low { border-left: 3px solid #FF6347; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo.png" alt="Logo" style="height: 50px;">
            <div class="logo">MINE-BASE</div>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            </nav>
    </header>

    <div class="panel-grid">
        
        <aside>
            <div class="version-info">
                <span class="v-main">V 1.0</span>
                <span class="v-sub">alpha 1.0 build 03</span>
            </div>

            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top: 0;">🧭 НАВИГАЦИЯ</h3>
                
                <details>
                    <summary>🌌 ПОРТАЛ / КООРДИНАТЫ</summary>
                    <div style="padding: 10px;">
                        <input type="number" id="overworldInp" class="calc-input" placeholder="Мир (X / Z)" oninput="calcCoords('over')">
                        <div style="text-align: center; color: var(--accent); font-weight: bold;">↕ 8:1 ↕</div>
                        <input type="number" id="netherInp" class="calc-input" placeholder="Незер (X / Z)" oninput="calcCoords('neth')">
                    </div>
                </details>

                <details open style="margin-top: 15px;">
                    <summary>🎨 ГЕНЕРАТОР БРОНИ (NBT Color)</summary>
                    <div class="armor-generator">
                        <div class="color-picker-wrap">
                            <input type="color" id="armorDyePicker" value="#3c44aa" oninput="updateArmorCmds(this.value)">
                            <div style="font-size: 0.85rem; color: #aaa;">
                                Выбери цвет.<br>Команды генерируются для версий <b>1.14+</b>
                            </div>
                        </div>
                        <div class="armor-cmds" id="armorCmdOutput">
                            </div>
                    </div>
                </details>

            </div>
        </aside>

        <main class="notes-area">
            <h2 style="color: var(--accent); margin-top: 0;">📒 МОИ ЗАМЕТКИ</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="noteInput" class="calc-input" style="margin: 0;" placeholder="Добавить задачу...">
                <button class="tool-btn" style="margin: 0; width: auto; padding: 0 25px;" onclick="addNote()">ДОБАВИТЬ</button>
            </div>
            <div id="notesContainer">
                </div>
        </main>

        <aside>
            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top: 0;">🍎 ТАБЛИЦА СЫТОСТИ</h3>
                <div style="max-height: 400px; overflow-y: auto; background: #111; border-radius: 4px; border: 1px solid #333;">
                    <table class="food-table">
                        <thead>
                            <tr>
                                <th>Еда</th>
                                <th>Голод</th>
                                <th>Насыщ.</th>
                            </tr>
                        </thead>
                        <tbody id="foodTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="sidebar-block" style="margin-top: 20px;">
                <h3 style="color: var(--accent); margin-top: 0;">📜 WIKI КОМАНД</h3>
                <input type="text" id="cmdSearch" class="calc-input" placeholder="Поиск команды..." oninput="filterCmds()">
                <div id="cmdContainer" style="max-height: 300px; overflow-y: auto;">
                    </div>
            </div>
        </aside>

    </div>

    <script>
        // --- ГЕНЕРАТОР КОМАНД БРОНИ (INT COLOR) ---
        // Minecraft использует не HEX, а Decimal Integer для цветов.
        function hexToInt(hex) {
            return parseInt(hex.replace(/^#/, ''), 16);
        }

        function updateArmorCmds(hexColor) {
            const intColor = hexToInt(hexColor);
            const container = document.getElementById('armorCmdOutput');
            
            const pieces = [
                { id: "leather_helmet", icon: "🧢" },
                { id: "leather_chestplate", icon: "👕" },
                { id: "leather_leggings", icon: "👖" },
                { id: "leather_boots", icon: "🥾" },
                { id: "leather_horse_armor", icon: "🐴" }
            ];

            let html = '';
            pieces.forEach(p => {
                const cmd = `/give @s minecraft:${p.id}{display:{color:${intColor}}}`;
                html += `
                    <div class="cmd-line">
                        <span>${p.icon}</span> /give @s ${p.id}{display:{color:<span class="c-val">${intColor}</span>}}
                        <button style="float:right; background:none; border:none; color:var(--accent); cursor:pointer;" onclick="copyTxt('${cmd}')">📋</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // --- НОВАЯ ТАБЛИЦА ЕДЫ ---
        const foodTiers = [
            { class: "tier-great", name: "Золотая морковь", h: "6 (🍗x3)", s: "14.4" },
            { class: "tier-great", name: "Золотое яблоко", h: "4 (🍗x2)", s: "9.6" },
            { class: "tier-good", name: "Стейк / Свинина", h: "8 (🍗x4)", s: "12.8" },
            { class: "tier-good", name: "Жареный лосось", h: "6 (🍗x3)", s: "9.6" },
            { class: "tier-normal", name: "Хлеб", h: "5 (🍗x2.5)", s: "6.0" },
            { class: "tier-normal", name: "Печеный картофель", h: "5 (🍗x2.5)", s: "6.0" },
            { class: "tier-low", name: "Яблоко", h: "4 (🍗x2)", s: "2.4" },
            { class: "tier-low", name: "Сырая говядина", h: "3 (🍗x1.5)", s: "1.8" },
            { class: "tier-low", name: "Гнилая плоть", h: "4 (🍗x2)", s: "0.8" }
        ];

        function loadFoodTable() {
            const tbody = document.getElementById('foodTableBody');
            let html = '';
            foodTiers.forEach(f => {
                html += `
                    <tr class="${f.class}">
                        <td style="font-weight: bold;">${f.name}</td>
                        <td>${f.h}</td>
                        <td style="color: var(--accent);">${f.s}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // --- КООРДИНАТЫ ---
        function calcCoords(type) {
            const o = document.getElementById('overworldInp');
            const n = document.getElementById('netherInp');
            if(type === 'over') n.value = (o.value / 8).toFixed(1);
            else o.value = (n.value * 8).toFixed(1);
        }

        // --- ЗАМЕТКИ ---
        function addNote() {
            const inp = document.getElementById('noteInput');
            if(!inp.value.trim()) return;
            
            const container = document.getElementById('notesContainer');
            const note = document.createElement('div');
            note.className = 'note-item';
            note.innerHTML = `
                <div class="note-circle" onclick="this.parentElement.classList.toggle('done')" style="width:20px;height:20px;border:2px solid var(--accent);border-radius:50%;cursor:pointer;"></div>
                <span class="note-text">${inp.value}</span>
                <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
            `;
            container.prepend(note);
            inp.value = '';
        }

        // --- КОМАНДЫ WIKI ---
        const commands = [
            { code: "/tp @s ~ ~ ~", desc: "Телепортация в координаты" },
            { code: "/gamemode survival", desc: "Смена режима на Выживание" },
            { code: "/give @p diamond 64", desc: "Выдать стак алмазов" },
            { code: "/locate structure", desc: "Найти структуру" },
            { code: "/fill ~ ~ ~ ~ ~ ~ stone", desc: "Заполнить блоками" }
        ];

        function filterCmds() {
            const q = document.getElementById('cmdSearch').value.toLowerCase();
            const container = document.getElementById('cmdContainer');
            container.innerHTML = '';
            
            commands.filter(c => c.code.includes(q) || c.desc.toLowerCase().includes(q)).forEach(c => {
                container.innerHTML += `
                    <div style="background:#151515; padding:10px; margin-bottom:8px; border-radius:4px; border:1px solid #333;">
                        <span style="color:var(--accent); font-family:monospace; display:block; margin-bottom:5px;">${c.code}</span>
                        <div style="font-size:0.75rem; color:gray; margin-bottom:5px;">${c.desc}</div>
                        <button style="background:#333; color:#fff; border:none; padding:4px 8px; border-radius:3px; font-size:0.7rem; cursor:pointer;" onclick="copyTxt('${c.code}')">КОПИРОВАТЬ</button>
                    </div>`;
            });
        }

        function copyTxt(t) {
            navigator.clipboard.writeText(t);
            alert("Скопировано: " + t);
        }

        // Инициализация при загрузке
        window.onload = () => {
            updateArmorCmds('#3c44aa'); // Загружаем дефолтный синий цвет
            loadFoodTable();
            filterCmds();
        };
    </script>
</body>
</html>
