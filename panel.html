<div class="panel-grid">
        <aside>
            <div class="version-info">
                <span class="v-main">V 1.0</span>
                <span class="v-sub">alpha 1.0 build 06</span>
            </div>

            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top: 0;">🧭 НАВИГАЦИЯ</h3>
                <details open>
                    <summary>🌌 ПОРТАЛ / КООРДИНАТЫ</summary>
                    <div style="padding: 10px;">
                        <label style="font-size:0.7rem; color:gray;">ОВЕРВОРЛД</label>
                        <input type="number" id="overworldInp" class="calc-input" placeholder="X или Z" oninput="calcCoords('over')">
                        <div style="text-align: center; color: var(--accent); font-weight: bold; margin: 5px 0;">↕ 8 : 1 ↕</div>
                        <label style="font-size:0.7rem; color:gray;">НЕЗЕР</label>
                        <input type="number" id="netherInp" class="calc-input" placeholder="X или Z" oninput="calcCoords('neth')">
                    </div>
                </details>
                </div>
        </aside>

        <main class="notes-area">
            <h2 style="color: var(--accent); margin-top: 0;">📒 МОИ ЗАМЕТКИ</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="noteInput" class="calc-input" style="margin: 0;" placeholder="Добавить задачу...">
                <button class="tool-btn" style="margin: 0; width: auto; padding: 0 25px;" onclick="addNote()">ДОБАВИТЬ</button>
            </div>
            <div id="notesContainer"></div>
        </main>

        <aside class="wiki-area">
            <h3 style="color: var(--accent); margin-top: 0;">📜 WIKI КОМАНД</h3>
            <input type="text" id="cmdSearch" class="calc-input" placeholder="Поиск команды..." oninput="filterCmds()">
            <div class="cmd-list" id="cmdContainer"></div>
        </aside>
    </div>

    <script>
        // ИСПРАВЛЕННЫЙ КАЛЬКУЛЯТОР КООРДИНАТ
        function calcCoords(type) {
            const over = document.getElementById('overworldInp');
            const neth = document.getElementById('netherInp');
            
            if (type === 'over') {
                const val = parseFloat(over.value);
                neth.value = isNaN(val) ? '' : Math.floor(val / 8);
            } else {
                const val = parseFloat(neth.value);
                over.value = isNaN(val) ? '' : Math.floor(val * 8);
            }
        }

        // ЛОГИКА ЗАМЕТОК С АВТОСОХРАНЕНИЕМ (чтобы не пропадали)
        function loadNotes() {
            const saved = JSON.parse(localStorage.getItem('my_notes') || '[]');
            saved.forEach(text => renderNote(text));
        }

        function addNote() {
            const inp = document.getElementById('noteInput');
            if(!inp.value.trim()) return;
            renderNote(inp.value);
            saveNotes();
            inp.value = '';
        }

        function renderNote(text) {
            const container = document.getElementById('notesContainer');
            const note = document.createElement('div');
            note.className = 'note-item';
            note.innerHTML = `
                <span class="note-text">${text}</span>
                <button class="btn-del" onclick="this.parentElement.remove(); saveNotes();">✕</button>`;
            container.prepend(note);
        }

        function saveNotes() {
            const notes = Array.from(document.querySelectorAll('.note-text')).map(n => n.innerText);
            localStorage.setItem('my_notes', JSON.stringify(notes));
        }

        // Инициализация всего остального...
        window.onload = () => {
            loadFoodTable();
            filterCmds();
            loadNotes(); // Загружаем заметки из памяти
        };
        
        // (Сюда добавь остальные свои функции из Build 04: filterCmds, loadFoodTable, processArmorTool и т.д.)
    </script>
