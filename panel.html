<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000 !important; overflow: hidden; }
        .grid-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 100vh;
            gap: 10px;
            padding: 10px;
        }
        .col { background: #111; border: 2px solid #222; padding: 20px; border-radius: 15px; }
        h2 { color: var(--panel-btn); text-align: center; }
        .big-btn {
            display: block;
            background: #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid var(--accent);
        }
    </style>
</head>
<body>
    <div class="grid-panel">
        <div class="col">
            <h2>Команды</h2>
            <div class="big-btn">/gamemode survival</div>
            <div class="big-btn">/tp @s ~ ~ ~</div>
        </div>
        <div class="col">
            <h2>Заметки</h2>
            <textarea style="width: 100%; height: 80%; background: transparent; color: white; border: none; font-size: 1.2rem; outline: none; resize: none;" placeholder="Твои цели на стрим или игру..."></textarea>
        </div>
        <div class="col">
            <h2>Утилиты</h2>
            <a href="index.html" class="big-btn">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
