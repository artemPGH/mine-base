<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | Лучшая База Знаний</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для всплывающего окна сервера */
        .server-item { position: relative; cursor: pointer; }
        
        .server-popup {
            display: none;
            position: absolute;
            left: 105%;
            top: 0;
            width: 220px;
            background: #1a1a1a;
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;
        }

        .server-item:hover .server-popup { display: block; }

        .popup-ip {
            background: #000;
            color: var(--accent);
            padding: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 10px;
            display: block;
            text-align: center;
            border: 1px dashed var(--accent);
        }

        .copy-hint {
            font-size: 0.7rem;
            color: gray;
            margin-top: 5px;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo.png" alt="Logo" style="height: 50px;">
            <div class="logo">MINE-BASE</div>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="panel.html" class="btn-panel">Игровая Панель 📺</a>
        </nav>
    </header>

    <section class="search-section">
        <div class="hero-overlay">
            <h1>БАЗА ЗНАНИЙ MINE-BASE 🏅</h1>
            <div class="search-wrapper">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">📁 Все категории</option>
                    <option value="Обновления">📢 Новости</option>
                    <option value="Моды">🧩 Моды</option>
                    <option value="Гайды">📚 Гайды</option>
                </select>
                <input type="text" id="searchInput" class="search-box" placeholder="Найти мод или гайд...">
            </div>
        </div>
    </section>

    <main class="main-container">
        <section id="news-container"></section>

        <aside>
            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">🛠 ИНСТРУМЕНТЫ</h3>
                <button class="tool-btn" onclick="openCmdModal()">ГЕНЕРАТОР /GIVE ⚙️</button>
                <a href="panel.html" class="tool-btn">ПОРТАЛ В НЕЗЕР 🌌</a>
            </div>

            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">📊 СЕРВЕРА ONLINE</h3>
                <div id="server-list">
                    <p style="color: gray; font-size: 0.9rem;">Загрузка серверов...</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="news-data.js"></script>
    <script>
        // СПИСОК ИЗ 5 СЕРВЕРОВ
        const servers = [
            { ip: 'mc.hypixel.net', name: 'Hypixel', desc: 'Самый большой сервер в мире: мини-игры, SkyBlock и BedWars.' },
            { ip: 'play.funtime.su', name: 'FunTime', desc: 'Лучшая анархия в СНГ. Гриферство, выживание и кланы.' },
            { ip: 'play.holyworld.ru', name: 'HolyWorld', desc: 'Популярная анархия с уникальными предметами и ивентами.' },
            { ip: 'play.wellmore.ru', name: 'WellMore', desc: 'Мини-игры на любой вкус и стабильный онлайн.' },
            { ip: 'play.mstnetwork.ru', name: 'MST Network', desc: 'Анархия, выживание и сильное комьюнити.' }
        ];

        async function loadServers() {
            const sList = document.getElementById('server-list');
            sList.innerHTML = '';
            
            for (let s of servers) {
                let statusText = 'Загрузка...';
                try {
                    const res = await fetch(`https://api.mcstatus.io/v2/status/java/${s.ip}`);
                    const data = await res.json();
                    statusText = data.online ? `${data.players.online.toLocaleString()} 🟢` : 'Offline 🔴';
                } catch {
                    statusText = 'Ошибка 🔴';
                }

                const sItem = document.createElement('div');
                sItem.className = 'server-item';
                sItem.innerHTML = `
                    <div style="display:flex; justify-content:space-between; width:100%;">
                        <span>${s.name}</span>
                        <span style="color:var(--accent)">${statusText}</span>
                    </div>
                    <div class="server-popup" onclick="copyIp('${s.ip}')">
                        <strong style="color:var(--accent)">${s.name}</strong>
                        <p style="font-size:0.8rem; margin: 10px 0; color:#ccc;">${s.desc}</p>
                        <span class="popup-ip">${s.ip}</span>
                        <span class="copy-hint">Нажми, чтобы скопировать</span>
                    </div>
                `;
                sList.appendChild(sItem);
            }
        }

        function copyIp(ip) {
            navigator.clipboard.writeText(ip);
            alert("IP сервера " + ip + " скопирован!");
        }

        // Логика фильтров (как в прошлом шаге)
        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = newsList.filter(item => {
                const matchesCategory = (category === 'all' || item.category === category);
                const matchesSearch = (item.title.toLowerCase().includes(searchText) || item.description.toLowerCase().includes(searchText));
                return matchesCategory && matchesSearch;
            });
            displayNews(filteredData);
        }

        function displayNews(data) {
            const container = document.getElementById('news-container');
            container.innerHTML = data.length ? '' : '<p style="color:gray; text-align:center;">Ничего не найдено...</p>';
            data.forEach((item, index) => {
                container.innerHTML += `
                    <article class="news-card">
                        <img src="${item.image}">
                        <div class="news-content">
                            <h2 style="color:var(--accent)">${item.title}</h2>
                            <p>${item.description}</p>
                            <div style="margin-top: 15px; font-size: 0.85rem;">
                                <span style="color: var(--accent);">🏷️ ${item.category}</span>
                            </div>
                        </div>
                    </article>`;
            });
        }

        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        window.onload = () => {
            displayNews(newsList);
            loadServers();
        };
    </script>
</body>
</html>
