<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | Лучшая База Знаний</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo.png" alt="Logo" style="height: 50px;" onerror="this.src='https://via.placeholder.com/50?text=MB'">
            <div class="logo">MINE-BASE</div>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="panel.html" class="btn-panel">Игровая Панель 📺</a>
        </nav>
    </header>

    <section class="search-section">
        <div class="hero-overlay">
            <h1>БАЗА ЗНАНИЙ MINE-BASE 🏅</h1>
            <div class="search-wrapper">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">📁 Все категории</option>
                    <option value="Обновления">📢 Новости</option>
                    <option value="Моды">🧩 Моды</option>
                    <option value="Гайды">📚 Гайды</option>
                </select>
                <input type="text" id="searchInput" class="search-box" placeholder="Найти мод или гайд...">
            </div>
        </div>
    </section>

    <main class="main-container">
        <section id="news-container"></section>

        <aside>
            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">🛠 ИНСТРУМЕНТЫ</h3>
                <button class="tool-btn" onclick="openCmdModal()">ГЕНЕРАТОР /GIVE ⚙️</button>
                <a href="panel.html" class="tool-btn">ПОРТАЛ В НЕЗЕР 🌌</a>
            </div>

            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">📊 СЕРВЕРА ONLINE</h3>
                <div id="server-list">
                    <p style="color: gray; font-size: 0.9rem;">Загрузка данных...</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="newsModal" class="modal">
        <div class="modal-content" style="max-width:700px">
            <span style="float:right; cursor:pointer; font-size:28px; color:white;" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" style="width:100%; border-radius:8px; margin-bottom: 20px;">
            <h2 id="modalTitle" style="color:var(--accent); margin-bottom: 15px;"></h2>
            <p id="modalText" style="line-height:1.7; white-space:pre-line; color: #ddd;"></p>
        </div>
    </div>

    <div id="cmdModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:28px; color:white;" onclick="closeCmdModal()">&times;</span>
            <h2 style="color: var(--accent); margin-top:0;">ГЕНЕРАТОР /GIVE</h2>
            <label>Получатель:</label>
            <select id="cmdTarget" class="calc-input" onchange="updateCmd()">
                <option value="@s">Себе (@s)</option>
                <option value="@p">Ближайшему (@p)</option>
                <option value="@a">Всем (@a)</option>
            </select>
            <label>Предмет:</label>
            <div style="position:relative;">
                <input type="text" id="itemSearch" class="calc-input" placeholder="diamond..." oninput="filterItems()">
                <div id="itemResults" class="item-search-results"></div>
            </div>
            <label>Количество:</label>
            <input type="number" id="cmdCount" class="calc-input" value="1" min="1" oninput="updateCmd()">
            <div id="cmdResult" style="background:#000; padding:15px; color:var(--accent); font-family:monospace; border: 1px solid #333; margin-bottom:10px;">/give @s stone 1</div>
            <button class="tool-btn" onclick="copyCommand()">СКОПИРОВАТЬ</button>
        </div>
    </div>

    <script src="news-data.js"></script>
    <script>
        // ИСПРАВЛЕННАЯ ЛОГИКА НОВОСТЕЙ
        const container = document.getElementById('news-container');
        
        function displayNews(data) {
            container.innerHTML = '';
            data.forEach((item) => {
                // Находим оригинальный индекс в newsList, чтобы модалка открывала ПРАВИЛЬНУЮ новость
                const originalIndex = newsList.findIndex(n => n.title === item.title);
                container.innerHTML += `
                    <article class="news-card" onclick="openFullNews(${originalIndex})">
                        <img src="${item.image}">
                        <div class="news-content">
                            <h2 style="color:var(--accent)">${item.title}</h2>
                            <p>${item.description}</p>
                            <div style="margin-top: 15px; font-size: 0.85rem;">
                                <span style="color: var(--accent);">🏷️ ${item.category}</span>
                                <span style="color: var(--text-muted); margin-left: 15px;">📅 ${item.date}</span>
                            </div>
                        </div>
                    </article>`;
            });
        }

        function openFullNews(idx) {
            const n = newsList[idx];
            if(!n) return;
            document.getElementById('modalImg').src = n.image;
            document.getElementById('modalTitle').innerText = n.title;
            document.getElementById('modalText').innerText = n.fullText;
            document.getElementById('newsModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }

        // Поиск и фильтры
        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            const filtered = e.target.value === 'all' ? newsList : newsList.filter(n => n.category === e.target.value);
            displayNews(filtered);
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = newsList.filter(n => n.title.toLowerCase().includes(val) || n.description.toLowerCase().includes(val));
            displayNews(filtered);
        });

        // Остальная логика (Сервера и Give) сохранена из твоего файла...
        const mcItems = ["stone", "grass_block", "dirt", "cobblestone", "oak_planks", "diamond_sword", "elytra", "netherite_ingot"];
        let selectedItem = "stone";
        function filterItems() {
            const input = document.getElementById('itemSearch').value.toLowerCase();
            const results = document.getElementById('itemResults');
            results.innerHTML = '';
            if (input.length < 1) { results.style.display = 'none'; return; }
            mcItems.filter(i => i.includes(input)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-option';
                div.innerText = item;
                div.onclick = () => { selectedItem = item; document.getElementById('itemSearch').value = item; results.style.display = 'none'; updateCmd(); };
                results.appendChild(div);
            });
            results.style.display = 'block';
        }
        function updateCmd() {
            const target = document.getElementById('cmdTarget').value;
            const count = document.getElementById('cmdCount').value || 1;
            document.getElementById('cmdResult').innerText = `/give ${target} minecraft:${selectedItem} ${count}`;
        }
        function copyCommand() { navigator.clipboard.writeText(document.getElementById('cmdResult').innerText); alert("Команда скопирована!"); }
        function openCmdModal() { document.getElementById('cmdModal').style.display = 'block'; }
        function closeCmdModal() { document.getElementById('cmdModal').style.display = 'none'; }

        async function loadServers() {
            const sList = document.getElementById('server-list');
            sList.innerHTML = '<p style="color:gray">Обновление...</p>';
            const servers = [{ip:'mc.hypixel.net', name:'Hypixel'}, {ip:'play.funtime.su', name:'FunTime'}];
            for (let s of servers) {
                try {
                    const res = await fetch(`https://api.mcstatus.io/v2/status/java/${s.ip}`);
                    const data = await res.json();
                    sList.innerHTML += `<div class="server-item"><span>${s.name}</span><span style="color:var(--accent)">${data.players.online} 🟢</span></div>`;
                } catch { /* ignore */ }
            }
        }

        window.onload = () => { displayNews(newsList); loadServers(); };
    </script>
</body>
</html>
