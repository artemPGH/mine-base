<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | Лучшая База Знаний</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo.png" alt="Logo" style="height: 50px;">
            <div class="logo">MINE-BASE</div>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="panel.html" class="btn-panel">Игровая Панель 📺</a>
        </nav>
    </header>

    <section class="search-section">
        <div class="hero-overlay">
            <h1>БАЗА ЗНАНИЙ MINE-BASE 🏅</h1>
            <div class="search-wrapper">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">📁 Все категории</option>
                    <option value="Обновления">📢 Новости</option>
                    <option value="Моды">🧩 Моды</option>
                    <option value="Гайды">📚 Гайды</option>
                </select>
                <input type="text" id="searchInput" class="search-box" placeholder="Найти мод или гайд...">
            </div>
        </div>
    </section>

    <main class="main-container">
        <section id="news-container"></section>

        <aside>
            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">🛠 ИНСТРУМЕНТЫ</h3>
                <button class="tool-btn" onclick="openCmdModal()">ГЕНЕРАТОР /GIVE ⚙️</button>
                <a href="panel.html" class="tool-btn">ПОРТАЛ В НЕЗЕР 🌌</a>
            </div>

            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">📊 СЕРВЕРА ONLINE</h3>
                <div id="server-list">
                    <p style="color: gray; font-size: 0.9rem;">Загрузка данных...</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="newsModal" class="modal">
        <div class="modal-content" style="max-width:700px">
            <span style="float:right; cursor:pointer; font-size:28px; color:white;" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" style="width:100%; border-radius:8px; margin-bottom: 20px;">
            <h2 id="modalTitle" style="color:var(--accent); margin-bottom: 15px;"></h2>
            <p id="modalText" style="line-height:1.7; white-space:pre-line; color: #ddd;"></p>
        </div>
    </div>

    <div id="cmdModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:28px; color:white;" onclick="closeCmdModal()">&times;</span>
            <h2 style="color: var(--accent); margin-top:0;">ГЕНЕРАТОР /GIVE</h2>
            <label style="font-size: 0.9rem;">Получатель:</label>
            <select id="cmdTarget" class="calc-input" onchange="updateCmd()">
                <option value="@s">Себе (@s)</option>
                <option value="@p">Ближайшему (@p)</option>
                <option value="@a">Всем (@a)</option>
            </select>
            <label style="font-size: 0.9rem;">Предмет (английский):</label>
            <div style="position:relative;">
                <input type="text" id="itemSearch" class="calc-input" placeholder="Начни писать: diamond..." oninput="filterItems()">
                <div id="itemResults" class="item-search-results"></div>
            </div>
            <label style="font-size: 0.9rem;">Количество:</label>
            <input type="number" id="cmdCount" class="calc-input" value="1" min="1" oninput="updateCmd()">
            <div style="background:#000; padding:15px; border-radius:4px; color:var(--accent); font-family:monospace; font-weight:bold; margin-bottom:15px; border: 1px solid #333;" id="cmdResult">
                /give @s minecraft:stone 1
            </div>
            <button class="tool-btn" onclick="copyCommand()">СКОПИРОВАТЬ КОМАНДУ</button>
        </div>
    </div>

    <script src="news-data.js"></script>
    <script>
        const mcItems = ["stone", "grass_block", "dirt", "cobblestone", "oak_planks", "bedrock", "water_bucket", "lava_bucket", "sand", "gravel", "gold_ore", "iron_ore", "coal_ore", "diamond_ore", "lapis_ore", "emerald_ore", "obsidian", "torch", "diamond_block", "iron_block", "gold_block", "emerald_block", "tnt", "bookshelf", "diamond_sword", "iron_sword", "golden_apple", "elytra", "trident", "netherite_ingot", "netherite_sword", "ender_pearl", "experience_bottle", "totem_of_undying"];
        let selectedItem = "stone";

        // Генератор /give
        function filterItems() {
            const input = document.getElementById('itemSearch').value.toLowerCase();
            const results = document.getElementById('itemResults');
            results.innerHTML = '';
            if (input.length < 1) { results.style.display = 'none'; return; }
            const filtered = mcItems.filter(i => i.includes(input));
            if (filtered.length > 0) {
                results.style.display = 'block';
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item-option';
                    div.innerText = item.replace('_', ' ');
                    div.onclick = () => {
                        selectedItem = item;
                        document.getElementById('itemSearch').value = item;
                        results.style.display = 'none';
                        updateCmd();
                    };
                    results.appendChild(div);
                });
            } else { results.style.display = 'none'; }
        }

        function updateCmd() {
            const target = document.getElementById('cmdTarget').value;
            const count = document.getElementById('cmdCount').value || 1;
            document.getElementById('cmdResult').innerText = `/give ${target} minecraft:${selectedItem} ${count}`;
        }

        function copyCommand() {
            navigator.clipboard.writeText(document.getElementById('cmdResult').innerText);
            alert("Команда скопирована!");
        }

        function openCmdModal() { document.getElementById('cmdModal').style.display = 'block'; }
        function closeCmdModal() { document.getElementById('cmdModal').style.display = 'none'; }

        // --- УЛУЧШЕННАЯ ЛОГИКА ФИЛЬТРАЦИИ И ПОИСКА ---
        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            const filteredData = newsList.filter(item => {
                const matchesCategory = (category === 'all' || item.category === category);
                const matchesSearch = (item.title.toLowerCase().includes(searchText) || item.description.toLowerCase().includes(searchText));
                return matchesCategory && matchesSearch;
            });

            displayNews(filteredData);
        }

        // Привязываем функцию к событиям
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function displayNews(data) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<p style="color:gray; text-align:center; padding:20px;">Ничего не найдено...</p>';
                return;
            }
            data.forEach((item) => {
                // Находим реальный индекс в исходном массиве newsList для модалки
                const realIndex = newsList.findIndex(n => n.title === item.title);
                container.innerHTML += `
                    <article class="news-card" onclick="openFullNews(${realIndex})">
                        <img src="${item.image}">
                        <div class="news-content">
                            <h2 style="color:var(--accent)">${item.title}</h2>
                            <p>${item.description}</p>
                            <div style="margin-top: 15px; font-size: 0.85rem; font-weight: 600;">
                                <span style="color: var(--accent);">🏷️ ${item.category}</span>
                                <span style="color: var(--text-muted); margin-left: 15px;">📅 ${item.date}</span>
                            </div>
                        </div>
                    </article>
                `;
            });
        }

        function openFullNews(idx) {
            const n = newsList[idx];
            document.getElementById('modalImg').src = n.image;
            document.getElementById('modalTitle').innerText = n.title;
            document.getElementById('modalText').innerText = n.fullText;
            document.getElementById('newsModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }

        // Сервера
        const servers = [
            { ip: 'mc.hypixel.net', name: 'Hypixel', desc: 'Лучший сервер мини-игр.' },
            { ip: 'play.funtime.su', name: 'FunTime', desc: 'Анархия и PvP.' }
        ];

        async function loadServers() {
            const sList = document.getElementById('server-list');
            sList.innerHTML = '';
            for (let s of servers) {
                try {
                    const res = await fetch(`https://api.mcstatus.io/v2/status/java/${s.ip}`);
                    const data = await res.json();
                    const online = data.online ? `${data.players.online.toLocaleString()} 🟢` : 'Offline 🔴';
                    sList.innerHTML += `<div class="server-item"><span>${s.name}</span><span style="color:var(--accent)">${online}</span></div>`;
                } catch {
                    sList.innerHTML += `<div class="server-item"><span>${s.name}</span><span style="color:gray">Error 🔴</span></div>`;
                }
            }
        }

        window.onload = () => { 
            displayNews(newsList); 
            loadServers(); 
        };
    </script>
</body>
</html>
