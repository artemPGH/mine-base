<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | База Знаний</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo.png" alt="MINE-BASE Logo" style="height: 50px; width: auto; filter: drop-shadow(0 0 5px rgba(85, 255, 85, 0.3));">
            <div class="logo">MINE-BASE</div>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="panel.html" class="btn-panel">Игровая Панель 📺</a>
        </nav>
    </header>

    <section class="search-section">
        <div class="hero-overlay">
            <h1 style="margin: 0; color: #fff; font-size: 2.5rem;">Весеннее обновление MINE-BASE 🌸</h1>
            <p style="color: #55ff55; font-size: 1.2rem; margin: 10px 0 0 0;">Ищи моды, команды, гайды и новости</p>
            
            <div class="search-wrapper">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">📁 Все</option>
                    <option value="Обновления">📢 Обновления</option>
                    <option value="Моды">🧩 Моды</option>
                    <option value="Гайды">📚 Гайды</option>
                    <option value="Команды">⌨️ Команды</option>
                </select>
                <input type="text" id="searchInput" class="search-box" placeholder="Введите название мода или версию...">
            </div>

        </div>
    </section>

    <main class="main-container">
        <section id="news-container"></section>

        <aside>
            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">🛠 Полезные инструменты</h3>
                <a href="#" class="tool-btn">Генератор команд /give</a>
                <a href="#" class="tool-btn">Калькулятор портала</a>
                <a href="#" class="tool-btn">Таблица зачарований</a>
            </div>
            
            <div class="sidebar-block">
                <h3 style="color: var(--accent); margin-top:0;">📊 Статус серверов</h3>
                <p style="font-size: 0.9rem;">Hypixel: <span style="color: #55ff55;">Online</span></p>
                <p style="font-size: 0.9rem;">MINE-BASE Server: <span style="color: #ff9800;">Coming Soon</span></p>
            </div>
        </aside>
    </main>

    <script src="news-data.js"></script>
    <script>
        const container = document.getElementById('news-container');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');

        function displayNews(data) {
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Ничего не найдено 😢 Попробуй изменить фильтры.</p>';
                return;
            }
            data.forEach(item => {
                container.innerHTML += `
                    <article class="news-card">
                        <img src="${item.image}" alt="img" onerror="this.src='https://images.unsplash.com/photo-1605639744655-bce6a4f2101e?q=80&w=600'">
                        <div class="news-content">
                            <h2 style="color: var(--accent); margin:0;">${item.title}</h2>
                            <p>${item.description}</p>
                            <small>📅 ${item.date} | 🏷️ ${item.category}</small>
                        </div>
                    </article>
                `;
            });
        }

        // Общая функция для фильтрации (работает и при вводе текста, и при выборе категории)
        function filterContent() {
            const textVal = searchInput.value.toLowerCase();
            const catVal = categoryFilter.value;

            const filtered = newsList.filter(n => {
                const textMatch = n.title.toLowerCase().includes(textVal) || n.description.toLowerCase().includes(textVal);
                const catMatch = (catVal === 'all') || (n.category === catVal);
                return textMatch && catMatch; // Должно совпадать и то, и другое
            });
            displayNews(filtered);
        }

        // Запускаем при загрузке
        window.onload = () => displayNews(newsList);

        // Слушаем изменения в тексте и в выпадающем списке
        searchInput.addEventListener('input', filterContent);
        categoryFilter.addEventListener('change', filterContent);
    </script>
</body>
</html>
