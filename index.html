<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE-BASE | База знаний Minecraft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MINE-BASE</div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="#">База знаний</a>
            <a href="panel.html" class="btn-panel">Игровая Панель 📺</a>
        </nav>
    </header>

    <section class="search-section">
        <h1>Поиск по MINE-BASE</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="Найти команду, крафт или новость...">
    </section>

    <main class="main-container">
        <section id="news-container">
            <h2>Последние обновления</h2>
            </section>

        <aside>
            <div style="background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid var(--border);">
                <h3>Быстрые ссылки</h3>
                <p>Здесь будут важные инструменты для игроков.</p>
            </div>
        </aside>
    </main>

    <script src="news-data.js"></script>
    <script>
        // Функция для вывода новостей на экран
        function displayNews() {
            const container = document.getElementById('news-container');
            
            // Проходимся по каждой новости из нашего списка
            newsList.forEach(item => {
                const article = document.createElement('article');
                article.className = 'news-card';
                article.innerHTML = `
                    <img src="${item.image}" alt="${item.title}">
                    <div class="news-content">
                        <h2>${item.title}</h2>
                        <p>${item.description}</p>
                        <small>${item.date}</small>
                    </div>
                `;
                container.appendChild(article);
            });
        }

        // Запускаем вывод при загрузке страницы
        window.onload = displayNews;
    </script>
</body>
</html>
